name: weather forecast production cd

on:
  workflow_run:
    workflows: ["weather forecast ci"]
    types: [completed]
    branches: [main]

permissions:
      id-token: write
      contents: read

jobs:
  deploy-to-production-webapp:
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/reusable-deploy-azure-webapp.yml
    with:
      environment_name: Production
      artifact_name: dotnet-app
      artifact_path: ./dotnet-app
      source_run_id: ${{ github.event.workflow_run.id }}
      webapp_name: weatherforecastpipelineprod
    secrets: 
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}