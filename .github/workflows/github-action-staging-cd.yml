name: weather forecast staging cd

on:
  workflow_run:
    workflows: ["weather forecast ci"]
    types:
      - completed

permissions:
      id-token: write
      contents: read

jobs:
  debug:
    if: >
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging'
    runs-on: ubuntu-latest
    environment: Staging
    
    steps:
      - name: Show selected environment
        run: echo "Environment is ${{ job.environment.name }}"

      - name: Check Azure secret presence
        run: |
          [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && echo "CLIENT_ID present" || echo "CLIENT_ID missing"
          [ -n "${{ secrets.AZURE_TENANT_ID }}" ] && echo "TENANT_ID present" || echo "TENANT_ID missing"
          [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && echo "SUBSCRIPTION_ID present" || echo "SUBSCRIPTION_ID missing"


  deploy-to-staging-webapp:
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'staging'
    environment: Staging
    uses: ./.github/workflows/reusable-deploy-azure-webapp.yml
    with:
      environment_name: Staging
      artifact_name: dotnet-app
      artifact_path: ./dotnet-app
      source_run_id: ${{ github.event.workflow_run.id }}
      webapp_name: weatherforecastpipelineapp
    secrets: 
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}




      